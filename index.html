<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon-48.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MicroID" />
    <meta name="theme-color" content="#003087" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>MicroID Lab Guide — Bio 431</title>
    <!-- Apply persisted (or system) theme before first paint to avoid a light-mode flash -->
    <script>
      try {
        var persisted = JSON.parse(localStorage.getItem("microid-app"));
        var dark = persisted && persisted.state
          ? persisted.state.darkMode
          : window.matchMedia("(prefers-color-scheme: dark)").matches;
        if (dark) document.documentElement.classList.add("dark");
      } catch (e) {}
    </script>
    <!-- Pin the app shell to the REAL viewport height. On iOS standalone PWAs,
         100dvh/100vh are computed too short on first launch and only correct
         after a scroll (making the bottom nav sit high until you swipe).
         window.innerHeight is reliable, so drive the height from it and
         re-apply on the resize/orientation events iOS fires after launch. -->
    <script>
      (function () {
        function setAppHeight() {
          document.documentElement.style.setProperty("--app-height", window.innerHeight + "px");
        }
        setAppHeight();
        window.addEventListener("resize", setAppHeight);
        window.addEventListener("orientationchange", setAppHeight);
        window.addEventListener("pageshow", setAppHeight);
        window.addEventListener("load", function () {
          setAppHeight();
          requestAnimationFrame(setAppHeight);
          setTimeout(setAppHeight, 300);
        });
      })();
    </script>
  </head>
  <body class="bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
